name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn httpx pydantic pydantic-settings python-dotenv pytest pytest-asyncio ruff mypy

      - name: Run quality checks
        run: |
          python -m ruff check src tests
          python -m mypy src tests
          python -m pytest
