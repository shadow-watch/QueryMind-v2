name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn httpx pydantic pydantic-settings python-dotenv pytest pytest-asyncio ruff mypy

      - name: Quality checks
        run: |
          python -m ruff check src tests
          python -m mypy src tests
          python -m pytest

      - name: Build Docker image
        run: docker build -t querymind-v2:${GITHUB_REF_NAME} .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          name: QueryMind v2 ${{ github.ref_name }}
